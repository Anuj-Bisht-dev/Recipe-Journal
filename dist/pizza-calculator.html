<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/src/output.css">
    <link rel="shortcut icon" href="assets/images/project-favicon-image.png" type="image/x-icon">
    <title>Recipe Journal</title>
</head>

<body class="max-h-full">
    <!-- create it only for mobile version not for pc. -->

    <header class="flex flex-col">
        <section class="mt-8 mx-6 flex justify-between items-center">
            <h2 class="font-bold text-2xl">Pizza Calculator</h2>
            <button>
                <img src="assets/images/navbar-plus-icon.svg" alt="navbar-plus-icon" loading="lazy"
                    class="w-8 contrast-50">
            </button>
        </section>

        <section class="flex mx-auto border border-gray-400/70 w-fit mt-4 rounded-xl p-1 bg-gray-100">
            <img src="assets/images/navbar-search-area-icon-.svg" alt="search-btn" class="w-6 contrast-25">
            <input type="text" placeholder="search here" class="w-60 ml-2 outline-0">
        </section>

    </header>
    <main id="pizza-calculator-main-container" class="flex flex-col gap-y-6 my-6 mb-18"> </main>

    <footer class="flex fixed bottom-0 w-full bg-gray-100 h-16">
        <section class="flex mx-auto gap-x-10 items-start py-4">
            <a href="index.html">
                <button class="flex gap-2 items-center pt-1">
                    <img src="assets/images/footer-fork-and-knife-btn-icon.svg" alt="Recipe-Book-icon" loading="lazy"
                        class="w-5 h-5 bg-white invert-100 contrast-50 brightness-50 rounded-sm">
                    <h4 class="font-semibold text-black/70">Recipe Book</h4>
                </button>
            </a>

            <a href="pizza-calculator.html">
                <button class="flex gap-2 bg-white py-1 px-2 rounded-xl border border-black/20 items-center">
                    <img src="assets/images/footer-pizza-btn-icon.svg" alt="Pizza-Calculator-icon" loading="lazy"
                        class="w-5">
                    <h4 class="font-semibold">Pizza Calculator</h4>
                </button>
            </a>
        </section>
    </footer>

</body>
<script src="pizzaCalculatorScript.js"></script>

</html>

</html>
